<section class="card">

    <h2>Final Exam Calculator</h2>

    <input
        type="number"
        id="currentGrade"
        placeholder="Current Grade (%)"
    >

    <input
        type="number"
        id="targetGrade"
        placeholder="Desired Final Grade (%)"
    >

    <input
        type="number"
        id="finalWeight"
        placeholder="Final Exam Weight (%)"
    >

    <button onclick="calculateFinalExam()">
        Calculate Required Score
    </button>

    <div id="finalExamResult"></div>

</section>
